<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="./assets/rupee-indian.png">
</head>
<body> 
    <div class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p>Manage your money smarter.</p>
        </header>

        <!-- Balance -->
        <section class="balance-card">
            <h3>Total Balance</h3>
            <h2 id="balance">₹0.00</h2>
        </section>

        <!-- Summary -->
        <section class="summary">
            <div class="card income">
                <h4>Income</h4>
                <p id="money-plus">₹0.00</p>
            </div>
            <div class="card expense">
                <h4>Expense</h4>
                <p id="money-minus">₹0.00</p>
            </div>
        </section>
        <main class="content">
            <section class="history">
                <div class="search-box">
    <input
        type="text"
        id="search"
        placeholder="🔍 Search transactions..."
    >
</div>
                <h3>Transaction History</h3>
                <ul id="list">
                </ul>
            </section>
            <!-- Form -->
            <section class="form-section">
                <h3>Add Transaction</h3>
                <form id="form">
                    <label for="text">Description</label>
                    <input
                        type="text" id="text" placeholder="Enter description" required>
                    <label for="amount">Amount</label>
                    <input
                        type="number" id="amount" placeholder="Use negative (-) for expenses" required>
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="">Select Category</option>
                        <option>Salary</option>
                        <option>Food</option>
                        <option>Shopping</option>
                        <option>Travel</option>
                        <option>Bills</option>
                        <option>Health</option>
                        <option>Entertainment</option>
                        <option>Education</option>
                        <option>Other</option>

                    </select>
                    <label for="payment">Payment Method</label>

                    <select id="payment">
                        <option value="">Select Method</option>
                        <option>Cash</option>
                        <option>UPI</option>
                        <option>Debit Card</option>
                        <option>Credit Card</option>
                        <option>Net Banking</option>
                        <option>Wallet</option>
                    </select>
                    <button type="submit">Add Transaction</button>
                </form>
            </section>
        </main>
    </div>
    <script src="expense.js"></script>
</body>
</html>
