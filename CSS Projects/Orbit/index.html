<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit-Keep your life in orbit</title>
    <link rel="stylesheet" href="style.css">
    <title>Orbit - Keep your life in orbit</title>

<link rel="icon" type="image/png" href="./assets/saturn.png">
</head>

<body>
    <section id="login-screen">
        <form class="login-card" id="login-form">

            <h1 class="logo">ORBIT</h1>

            <p class="tagline">
                Keep your life in orbit.
            </p>
            <label for="existing-users">
                Choose Existing User
            </label>
            <select id="existing-users">
                <option value="">
                    Select a user
                </option>
            </select>

            <div class="divider">
                <span>OR</span>
            </div>

            <label for="new-user-input">
                Create New User
            </label>

            <input type="text" id="new-user-input" placeholder="Enter username">

            <button type="submit" id="continue-btn">
                Continue
            </button>
        </form>
    </section>
    <main id="app-screen" class="hidden">
        <div class="app-container">
        <header class="app-header">

            <div class="header-content">

                <h1 class="logo">
                    ORBIT
                </h1>

                <p class="tagline">
                    Keep your life in orbit.
                </p>

            </div>

            <button id="theme-toggle">
                🌙
            </button>

        </header>
        <!-- SEARCH -->
        <section class="search-section">

            <input type="text" id="search-input" placeholder="🔍 Search everything...">
        </section>
        <!-- USER CONTROLS -->
       <section class="user-controls">

    <div class="user-info">

        <span class="user-label">
            Current User
        </span>

        <h3 id="current-user">
            Vansh
        </h3>

    </div>

    <div class="user-actions">

        <button id="switch-user-btn">
            Switch User
        </button>

        <button id="logout-btn">
            Logout
        </button>

    </div>

</section>
        <!-- TASK FORM -->
        <section class="task-form">

            <input type="text" id="task-input" placeholder="Add a new task...">

            <div class="task-options">

                <select id="priority-select">

                    <option value="High">
                        🔴 High
                    </option>

                    <option value="Medium">
                        🟡 Medium
                    </option>

                    <option value="Low">
                        🟢 Low
                    </option>

                </select>
                 <input type="date" id="due-date">
            </div>
                <button id="add-task-btn">
                    + Add Task
                </button>
        </section>
        <!-- FILTERS -->
        <section class="filters">
            <button class="filter-btn active" data-filter="all">
                All
            </button>
            <button class="filter-btn" data-filter="pending">
                Pending
            </button>
            <button class="filter-btn" data-filter="completed">
                Completed
            </button>
        </section>
        <!-- TASK LIST -->
        <ul id="task-list">
            <!-- Tasks will be generated dynamically -->
        </ul>
        <section id="empty-state" class="hidden">

            <h3>
                The orbit is empty.
            </h3>

            <p>
                Add a task to begin.
            </p>

        </section>
        <section class="progress-section">

            <h3>
                Today's Progress
            </h3>

            <div class="progress-bar">

                <div id="progress-fill"></div>

            </div>

            <p id="progress-text">
                0 / 0 tasks completed today
            </p>

        </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
